<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saju Energy Decoder</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        body { font-family: 'Cormorant Garamond', serif; background-color: #0d1b2a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); width: 90%; max-width: 380px; text-align: center; }
        h1 { font-size: 1.6rem; color: #222; margin-bottom: 1.5rem; letter-spacing: -0.5px; }
        .input-label { font-size: 0.8rem; color: #aaa; text-align: left; margin-bottom: 4px; padding-left: 4px; }
        input { width: 90%; padding: 12px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 1.2rem; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: #d4a373; }
        .time-row { display: flex; gap: 10px; margin-bottom: 1.2rem; }
        .time-row select { flex: 1; padding: 12px 8px; border: 1px solid #eee; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; background: white; color: #333; appearance: none; text-align: center; }
        .time-row select:focus { border-color: #d4a373; }
        .time-separator { display: flex; align-items: center; font-size: 1.2rem; color: #aaa; padding-bottom: 0; }
        button { background: #222; color: white; border: none; padding: 14px 28px; border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: 600; width: 100%; transition: 0.3s; }
        button:hover { background: #444; transform: translateY(-2px); }
        #result { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #eee; display: none; animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .energy-tag { font-size: 1.4rem; font-weight: bold; color: #b07d4a; margin-bottom: 0.5rem; }
        .description { font-size: 0.95rem; color: #666; line-height: 1.6; }
        .shifted-note { font-size: 0.78rem; color: #c0a080; margin-top: 0.4rem; margin-bottom: 0.2rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Your Soul Energy 💫 </h1>
    <p style="font-size: 0.85rem; color: #999; margin-bottom: 1.5rem;">Enter your birth date &amp; time to decode your Daymaster.</p>

    <div class="input-label">Birth Date</div>
    <input type="date" id="birthDate" value="1995-01-01">

    <div class="input-label">Birth Time <span style="color:#ccc;">(optional)</span></div>
    <div class="time-row">
        <select id="birthHour">
            <option value="">Hour</option>
            <option value="0">AM 12</option><option value="1">AM 1</option><option value="2">AM 2</option>
            <option value="3">AM 3</option><option value="4">AM 4</option><option value="5">AM 5</option>
            <option value="6">AM 6</option><option value="7">AM 7</option><option value="8">AM 8</option>
            <option value="9">AM 9</option><option value="10">AM 10</option><option value="11">AM 11</option>
            <option value="12">PM 12</option><option value="13">PM 1</option><option value="14">PM 2</option>
            <option value="15">PM 3</option><option value="16">PM 4</option><option value="17">PM 5</option>
            <option value="18">PM 6</option><option value="19">PM 7</option><option value="20">PM 8</option>
            <option value="21">PM 9</option><option value="22">PM 10</option><option value="23">PM 11</option>
        </select>
        <div class="time-separator">:</div>
        <select id="birthMinute">
            <option value="">Min</option>
            <option value="0">00</option><option value="10">10</option><option value="20">20</option>
            <option value="30">30</option><option value="40">40</option><option value="50">50</option>
        </select>
    </div>

    <button onclick="calculateEnergy()">Decode My Energy</button>

    <div id="result">
        <div class="description">Your Core Identity:</div>
        <div id="daymasterName" class="energy-tag"></div>
        <div id="shiftedNote" class="shifted-note"></div>
        <div id="energyMotto" class="description"></div>
        <div style="margin-top: 1.5rem; background: #fafafa; padding: 1rem; border-radius: 10px;">
            <p style="font-size: 0.8rem; color: #888; margin: 0;">🧐Curious about what this means?<br><b>Follow for daily energy tips</b> and insights!😊</p>
        </div>
    </div>
</div>

<script>
    function calculateEnergy() {
        try {
            const dateInput = document.getElementById('birthDate').value;
            if (!dateInput) return alert('Please select your birth date.');

            const parts = dateInput.split('-');
            let year = parseInt(parts[0]);
            let month = parseInt(parts[1]);
            let day = parseInt(parts[2]);

            const hourVal = document.getElementById('birthHour').value;
            const minVal = document.getElementById('birthMinute').value;

            let shifted = false;

            if (hourVal !== '' && minVal !== '') {
                const hour = parseInt(hourVal);
                const minute = parseInt(minVal);
                const totalMinutes = hour * 60 + minute;

                if (totalMinutes >= 23 * 60 + 30) {
                    const dateObj = new Date(year, month - 1, day);
                    dateObj.setDate(dateObj.getDate() + 1);
                    year = dateObj.getFullYear();
                    month = dateObj.getMonth() + 1;
                    day = dateObj.getDate();
                    shifted = true;
                }
            }

            const solar = Solar.fromYmd(year, month, day);
            const lunar = solar.getLunar();
            const dayGan = lunar.getDayGan();

            const TRANSLATION = {
                '甲': 'Yang Wood 🌲', '乙': 'Yin Wood 🌱',
                '丙': 'Yang Fire 🔥', '丁': 'Yin Fire 🕯️',
                '戊': 'Yang Earth ⛰️', '己': 'Yin Earth 🪴',
                '庚': 'Yang Metal 🪨', '辛': 'Yin Metal 💎',
                '壬': 'Yang Water 🌊', '癸': 'Yin Water 💧'
            };

            const MOTTOS = {
                'Wood': 'Growth, Creativity, and Infinite Potential.',
                'Fire': 'Passion, Transformation, and Radiance.',
                'Earth': 'Stability, Grounding, and Nurturing.',
                'Metal': 'Precision, Resilience, and Clarity.',
                'Water': 'Wisdom, Flow, and Intuition.'
            };

            const resultName = TRANSLATION[dayGan];
            const element = resultName.split(' ')[1];

            document.getElementById('daymasterName').innerText = resultName;
            document.getElementById('energyMotto').innerText = MOTTOS[element];

            const noteEl = document.getElementById('shiftedNote');
            if (shifted) {
                noteEl.innerText = `⏱ Born after 23:30 → calculated as ${year}.${String(month).padStart(2,'0')}.${String(day).padStart(2,'0')}`;
            } else {
                noteEl.innerText = '';
            }

            document.getElementById('result').style.display = 'block';

        } catch (e) {
            console.error(e);
            alert("Something went wrong. Please try again!");
        }
    }
</script>

</body>
</html>
