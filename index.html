<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saju Energy Decoder</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Cormorant Garamond', serif; background-color: #0d1b2a; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px 16px; }
        .container { background: white; padding: 2rem 1.8rem; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); width: 100%; max-width: 420px; text-align: center; }
        h1 { font-size: 2rem; color: #111; margin: 0 0 0.6rem; letter-spacing: -0.5px; font-weight: 700; }
        .subtitle { font-size: 1rem; color: #777; margin-bottom: 1.8rem; line-height: 1.5; }
        .input-label { font-size: 0.95rem; color: #555; text-align: left; margin-bottom: 6px; padding-left: 2px; font-weight: 600; }
        input[type="date"] { display: block; width: 100%; min-width: 0; padding: 14px 16px; border: 1.5px solid #ddd; border-radius: 12px; margin-bottom: 1.4rem; font-size: 1.1rem; font-family: inherit; outline: none; transition: 0.3s; color: #222; background: white; }
        input[type="date"]:focus { border-color: #c89b5a; box-shadow: 0 0 0 3px rgba(200,155,90,0.15); }
        .time-row { display: flex; gap: 10px; margin-bottom: 1.4rem; align-items: center; }
        .time-row select { flex: 1; min-width: 0; padding: 14px 10px; border: 1.5px solid #ddd; border-radius: 12px; font-size: 1.1rem; font-family: inherit; outline: none; transition: 0.3s; background: white; color: #222; -webkit-appearance: none; appearance: none; text-align: center; }
        .time-row select:focus { border-color: #c89b5a; box-shadow: 0 0 0 3px rgba(200,155,90,0.15); }
        .time-separator { font-size: 1.4rem; color: #888; flex-shrink: 0; }
        button {
            background: #1b2d5b;
            color: #ffffff;
            border: none;
            padding: 20.8px 16px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1.15rem;
            font-weight: 700;
            font-family: inherit;
            width: 100%;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }
        button:hover { background: #243a78; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        #result { margin-top: 2rem; padding-top: 1.8rem; border-top: 1.5px solid #eee; display: none; animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .result-label { font-size: 1rem; color: #888; margin-bottom: 0.3rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
        .energy-tag { font-size: 1.9rem; font-weight: 700; color: #b07d4a; margin: 0.3rem 0 0.6rem; line-height: 1.3; }
        .description { font-size: 1.05rem; color: #444; line-height: 1.7; }
        .shifted-note { font-size: 0.88rem; color: #b08040; margin: 0.4rem 0; background: #fdf6ec; padding: 8px 12px; border-radius: 8px; }
        .cta-box { margin-top: 1.6rem; background: #f7f5f2; padding: 1.1rem; border-radius: 12px; }
        .cta-box p { font-size: 0.95rem; color: #666; margin: 0; line-height: 1.6; }
        .cta-box b { color: #333; }
    </style>
</head>
<body>
<div class="container">
    <h1>Find Your Day Master 💫</h1>
    <p class="subtitle">Enter your birth date & time to decode your core energy.</p>

    <div class="input-label">Birth Date</div>
    <input type="date" id="birthDate" value="1995-01-01">

    <div class="input-label">Birth Time <span style="color:#bbb; font-weight:400;">(optional)</span></div>
    <div class="time-row">
        <select id="birthHour">
            <option value="">Hour</option>
            <option value="0">AM 12</option><option value="1">AM 1</option><option value="2">AM 2</option>
            <option value="3">AM 3</option><option value="4">AM 4</option><option value="5">AM 5</option>
            <option value="6">AM 6</option><option value="7">AM 7</option><option value="8">AM 8</option>
            <option value="9">AM 9</option><option value="10">AM 10</option><option value="11">AM 11</option>
            <option value="12">PM 12</option><option value="13">PM 1</option><option value="14">PM 2</option>
            <option value="15">PM 3</option><option value="16">PM 4</option><option value="17">PM 5</option>
            <option value="18">PM 6</option><option value="19">PM 7</option><option value="20">PM 8</option>
            <option value="21">PM 9</option><option value="22">PM 10</option><option value="23">PM 11</option>
        </select>
        <div class="time-separator">:</div>
        <select id="birthMinute">
            <option value="">Min</option>
            <option value="0">00</option><option value="10">10</option><option value="20">20</option>
            <option value="30">30</option><option value="40">40</option><option value="50">50</option>
        </select>
    </div>

    <button onclick="calculateEnergy()">✨ Decode My Energy</button>

    <div id="result">
        <div class="result-label">Your Core Identity</div>
        <div id="daymasterName" class="energy-tag"></div>
        <div id="shiftedNote" class="shifted-note" style="display:none;"></div>
        <div id="energyMotto" class="description"></div>
        <div class="cta-box">
            <p>🧐 Curious about what this means?<br><b>Follow for daily energy tips and insights!</b> 😊</p>
        </div>
    </div>
</div>

<script>
    function calculateEnergy() {
        try {
            const dateInput = document.getElementById('birthDate').value;
            if (!dateInput) return alert('Please select your birth date.');

            const parts = dateInput.split('-');
            let year = parseInt(parts[0]);
            let month = parseInt(parts[1]);
            let day = parseInt(parts[2]);

            const hourVal = document.getElementById('birthHour').value;
            const minVal = document.getElementById('birthMinute').value;
            let shifted = false;

            if (hourVal !== '' && minVal !== '') {
                const hour = parseInt(hourVal);
                const minute = parseInt(minVal);
                const totalMinutes = hour * 60 + minute;
                if (totalMinutes >= 23 * 60 + 30) {
                    const dateObj = new Date(year, month - 1, day);
                    dateObj.setDate(dateObj.getDate() + 1);
                    year = dateObj.getFullYear();
                    month = dateObj.getMonth() + 1;
                    day = dateObj.getDate();
                    shifted = true;
                }
            }

            const solar = Solar.fromYmd(year, month, day);
            const lunar = solar.getLunar();
            const dayGan = lunar.getDayGan();

            const TRANSLATION = {
                '甲': 'Yang Wood 🌲', '乙': 'Yin Wood 🌱',
                '丙': 'Yang Fire 🔥', '丁': 'Yin Fire 🕯️',
                '戊': 'Yang Earth ⛰️', '己': 'Yin Earth 🪴',
                '庚': 'Yang Metal 🪨', '辛': 'Yin Metal 💎',
                '壬': 'Yang Water 🌊', '癸': 'Yin Water 💧'
            };

            const MOTTOS = {
                'Wood': 'Growth, Creativity, and Infinite Potential.',
                'Fire': 'Passion, Transformation, and Radiance.',
                'Earth': 'Stability, Grounding, and Nurturing.',
                'Metal': 'Precision, Resilience, and Clarity.',
                'Water': 'Wisdom, Flow, and Intuition.'
            };

            const resultName = TRANSLATION[dayGan];
            const element = resultName.split(' ')[1];

            document.getElementById('daymasterName').innerText = resultName;
            document.getElementById('energyMotto').innerText = MOTTOS[element];

            const noteEl = document.getElementById('shiftedNote');
            if (shifted) {
                noteEl.innerText = `⏱ Born after 23:30 → calculated as ${year}.${String(month).padStart(2,'0')}.${String(day).padStart(2,'0')}`;
                noteEl.style.display = 'block';
            } else {
                noteEl.style.display = 'none';
            }

            document.getElementById('result').style.display = 'block';
        } catch (e) {
            console.error(e);
            alert("Something went wrong. Please try again!");
        }
    }
</script>
</body>
</html>
