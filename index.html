<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saju Energy Decoder</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        /* 기본 배경과 레이아웃은 유지하되 텍스트 가시성만 강화 */
        body { font-family: 'Cormorant Garamond', serif; background-color: #0d1b2a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); width: 90%; max-width: 380px; text-align: center; }
        
        /* 1. 제목 및 설명: 크기 키우고 완전 검정(#000)으로 변경 */
        h1 { font-size: 2.2rem; color: #000; margin-bottom: 1.2rem; letter-spacing: -0.5px; font-weight: 700; }
        .sub-header-p { font-size: 1.1rem; color: #222; margin-bottom: 1.5rem; font-weight: 500; }

        /* 2. 입력 레이블: 더 진하고 두껍게 */
        .input-label { font-size: 1.1rem; color: #000; text-align: left; margin-bottom: 6px; padding-left: 4px; font-weight: 700; }
        
        /* 3. 입력창: 글자 크기 키우고 테두리 진하게 */
        input { width: 90%; padding: 14px; border: 2px solid #555; border-radius: 12px; margin-bottom: 1.2rem; font-size: 1.2rem; outline: none; transition: 0.3s; color: #000; font-weight: 600; }
        input:focus { border-color: #d4a373; }
        
        .time-row { display: flex; gap: 10px; margin-bottom: 1.2rem; }
        .time-row select { flex: 1; padding: 14px 8px; border: 2px solid #555; border-radius: 12px; font-size: 1.1rem; outline: none; transition: 0.3s; background: white; color: #000; appearance: none; text-align: center; font-weight: 600; }
        
        .time-separator { display: flex; align-items: center; font-size: 1.6rem; color: #000; font-weight: bold; }
        
        /* 4. 버튼: 텍스트 크게 */
        button { background: #000; color: white; border: none; padding: 16px 28px; border-radius: 12px; cursor: pointer; font-size: 1.3rem; font-weight: 700; width: 100%; transition: 0.3s; }
        button:hover { background: #333; transform: translateY(-2px); }

        #result { margin-top: 2rem; padding-top: 1.5rem; border-top: 2px solid #ddd; display: none; animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 5. 결과 값: 아주 크고 명확한 색상으로 변경 */
        .energy-tag { font-size: 2.4rem; font-weight: 800; color: #8e5d2a; margin-bottom: 0.8rem; }
        .description { font-size: 1.2rem; color: #000; line-height: 1.6; font-weight: 600; }
        .shifted-note { font-size: 1rem; color: #b07d4a; margin-top: 0.5rem; font-weight: 700; }
        
        .footer-info { font-size: 1rem; color: #333; margin: 0; line-height: 1.5; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">

    <p class="sub-header-p">Enter your birth date &amp; time to decode your Daymaster.</p>

    <div class="input-label">Birth Date</div>
    <input type="date" id="birthDate" value="1995-01-01">

    <div class="input-label">Birth Time <span style="color:#444; font-weight:400;">(optional)</span></div>

            <option value="3">AM 3</option><option value="4">AM 4</option><option value="5">AM 5</option>
            <option value="6">AM 6</option><option value="7">AM 7</option><option value="8">AM 8</option>
            <option value="9">AM 9</option><option value="10">AM 10</option><option value="11">AM 11</option>
            <option value="12">PM 12</option><option value="13">PM 1</option><option value="14">PM 2</option>
            <option value="15">PM 3</option><option value="16">PM 4</option><option value="17">PM 5</option>
            <option value="18">PM 6</option><option value="19">PM 7</option><option value="20">PM 8</option>
            <option value="21">PM 9</option><option value="22">PM 10</option><option value="23">PM 11</option>
        </select>
        <div class="time-separator">:</div>
        <select id="birthMinute">
            <option value="">Min</option>
            <option value="0">00</option><option value="10">10</option><option value="20">20</option>
            <option value="30">30</option><option value="40">40</option><option value="50">50</option>
        </select>
    </div>
